  - name: 主力股
    stocks:
      - name: 五粮液
        code: "000858"
        market: a
        desc: 强周期性行业，目前存在低估值的可能。2025年4月披露增持公告，金额介于5亿至10亿元，且不设定价格区间。
      - name: 长虹华意
        code: "000404"
        market: a
        desc: 连续八年的国际压缩机龙头，但行业产能过剩严重。目前市值非常低，但营收依然非常可观，可能是一只"烟蒂"。
      - name: 英科医疗
        code: "300677"
        market: a
        desc: 从疫情中期开始，手套行业开始严重产能过剩，公司毛利大幅下降。但25年初公司透露目前产能利用率100%。股价近一个月涨超50%。
      - name: 新易盛
        code: "300502"
        market: a
        desc: 多年布局光模块，早期大笔投入研发和收购生产线，成为AI行情中光模块板块的大赢家。过去几年由于不分红，多数早期股东套现离场。
      - name: 铖昌科技
        code: "001270"
        market: a
        desc: 高毛利但负盈利，军工订单"脉冲式"波动，90%以上营收来自军工大客户，账期长达400天+。2025年5月实控人披露减持计划，累计套现超3.87亿元。
      - name: 中国科培
        code: "01890"
        market: hk
        desc: 老牌的教育股，现金奶牛，具有很强的浮存金优势。

  - name: 生物医药
    stocks:
      # ── A 股（科创板 688xxx / 沪市 600xxx）──
      - name: 亚虹医药
        code: "688176"
        market: a
        desc: 2024年初，APL-1202与化疗灌注联合使用的研究方向宣告失败。管线原本预计于2023年获批上市，有望成为国内首个NMIBC口服治疗药物。
      - name: 智翔金泰
        code: "688443"
        market: a
        desc: 2025年6月，与Cullinan Therapeutics就GR1803达成海外独家授权合作，包括2000万美元首付款和最高7亿美元的里程碑付款。
      - name: 益方生物
        code: "688382"
        market: a
        desc: 2022年12月武田与Nimbus就TYK-2变构抑制剂达成60亿美元合作（首付款40亿美元）。益方生物D-2570优异的临床数据，非常有望出海并与跨国药企展开深度商业化合作。
      - name: 盟科药业
        code: "688373"
        market: a
        desc: 盟科药业1.59亿股限售股8月5日起解禁，占总股本24.32%。
      - name: 美迪西
        code: "688202"
        market: a
        desc: 2024年扭盈为亏，股价大跌。但在2025年7月开始跟随创新药行情大幅上涨，一个月翻倍。
      - name: 艾迪药业
        code: "688488"
        market: a
        desc: 科研能力有限，过去一直靠卖抗HIV仿制药生存。长效抗HIV管线仅在临床前阶段，在赛道上远远落后。
      - name: 迈威生物
        code: "688062"
        market: a
        desc: 董事长因涉嫌短线交易被立案。两项BD合作：与齐鲁制药合作（3.8亿元首付款+1.2亿元里程碑款）；与谷歌系Calico围绕IL-11单抗（2500万美元首付款+5.71亿美元里程碑款）。
      - name: 康缘药业
        code: "600557"
        market: a
        desc: 康缘过去是中药企业，近两年业绩出现下滑。2024年底以2.7亿元收购中新医药100%股权，布局神经系统及代谢疾病。
      - name: 白云山
        code: "600332"
        market: a
        desc: 目前的中药产品线看不到什么盼头。2025年7月披露称，将拿出15亿元组成基金，做生物医药板块的股权投资。
      # ── 港 股 ──
      - name: 先声药业
        code: "02096"
        market: hk
        desc: 2024年8月，两位执行董事大幅减持。2025年3月凭借小分子抗新冠药实现超80%涨幅，但疫情只能带来短期刺激，高管可能对公司长期情况没有足够信心。
      - name: 复宏汉霖
        code: "02696"
        market: hk
        desc: 2024年6月尝试私有化退市，遭遇私募股东狙击后失败，股价跌回原先水平。2025年1月母公司发布回购公告，拟回购3亿-6亿元A股股份及不超过5%H股股票。
      - name: 康宁杰瑞
        code: "09966"
        market: hk
        desc: 中国"双抗元老"，经历多次临床失败。2024年将JSKN003授权给石药集团（4亿元首付款，最高30.8亿元里程碑款）。2025年6月董事长减持套现约1.17亿港元。
      - name: 康诺亚
        code: "02162"
        market: hk
        desc: 管理层豪华，Changyu Wang领导了全球首款PD-1靶向药Opdivo研发。4笔NewCo出海融资，总交易额约达16.985亿美元。
      - name: 欧康维视
        code: "01477"
        market: hk
        desc: 2024年8月与Alcon达成战略合作，引进多款眼科药物并发行新股，Alcon持股16.71%，交易总市值约10.2亿港元。
      - name: 翰森制药
        code: "03692"
        market: hk
        desc: 董事长钟慧娟为孙飘扬妻子。核心产品阿美替尼面临艾力斯伏美替尼的冲击（2024年销售额35.05亿，涨幅超77%）。
      - name: 药明巨诺
        code: "02126"
        market: hk
        desc: 目前仅有核心管线JWCAR029进展前沿，其余所有管线均在I期以下。CAR-T CD19赛道十分拥挤，越来越多的企业在布局。
      - name: 迈博药业
        code: "02181"
        market: hk
        desc: 管线稀少且均是大热门靶点的单抗，未来竞争力堪忧。
      - name: 北海康成
        code: "01228"
        market: hk
        desc: 一家专注于罕见病的公司。
      - name: 华领医药
        code: "02552"
        market: hk
        desc: 华领医药就是为Dorzagliatin而生，2011年获罗氏授权开发该产品。2024年底公告将收回Dorzagliatin权益，股价一度跌超20%。
      - name: 君圣泰医药
        code: "02511"
        market: hk
        desc: 2025年7月7日完成新股配售（占原股本10%），所得款项用于HTD1801的临床开发及商业化。
      - name: 嘉和生物
        code: "06998"
        market: hk
        desc: 反向收购亿腾嘉和，以换股形式完成借壳上市，亿腾持股77.43%、嘉和股东持股22.57%。
      - name: 开拓药业
        code: "09939"
        market: hk
        desc: 董事长童友之2024/9/3至2025/7/24陆续增持，股份比例从10.35%增加到11.18%。2025/8/1公告将配售4.62%股份。
      - name: 永泰生物
        code: "06978"
        market: hk
        desc: 公司核心创始人王歈博士已提交辞呈，将辞去执行董事、首席执行官及首席科技官职务，辞职自2025年6月25日起生效。

